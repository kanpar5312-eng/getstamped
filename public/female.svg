<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C3340"/>
      <stop offset="55%" stop-color="#1B2230"/>
      <stop offset="100%" stop-color="#0E141C"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E8C9A8"/>
      <stop offset="100%" stop-color="#B98F6B"/>
    </linearGradient>
    <linearGradient id="hair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3A2418"/>
      <stop offset="100%" stop-color="#1C0F08"/>
    </linearGradient>
    <linearGradient id="suit" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1F2A38"/>
      <stop offset="100%" stop-color="#0A1018"/>
    </linearGradient>
    <radialGradient id="rim" cx="50%" cy="35%" r="55%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.10)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- backdrop -->
  <rect width="800" height="1000" fill="url(#bg)"/>
  <rect width="800" height="1000" fill="url(#rim)"/>

  <!-- shoulders / suit -->
  <path d="M 80 1000 L 80 820 C 80 740 200 700 320 690 L 480 690 C 600 700 720 740 720 820 L 720 1000 Z"
        fill="url(#suit)"/>
  <!-- lapel hint -->
  <path d="M 320 690 L 400 850 L 480 690 Z" fill="rgba(255,255,255,0.04)"/>

  <!-- neck -->
  <path d="M 340 670 Q 400 720 460 670 L 460 740 Q 400 770 340 740 Z" fill="url(#skin)"/>

  <!-- hair back -->
  <path d="M 220 420 Q 220 220 400 200 Q 580 220 580 420 L 580 720 Q 540 760 480 700 L 480 460 L 320 460 L 320 700 Q 260 760 220 720 Z"
        fill="url(#hair)"/>

  <!-- face -->
  <ellipse cx="400" cy="440" rx="155" ry="195" fill="url(#skin)"/>

  <!-- hair front (side sweep) -->
  <path d="M 245 380 Q 280 250 400 230 Q 520 250 555 380 Q 520 320 460 320 Q 400 360 340 320 Q 290 320 245 380 Z"
        fill="url(#hair)"/>

  <!-- subtle facial features (very minimal — editorial silhouette) -->
  <g opacity="0.42">
    <ellipse cx="345" cy="445" rx="6" ry="3" fill="#1B1209"/>
    <ellipse cx="455" cy="445" rx="6" ry="3" fill="#1B1209"/>
    <path d="M 372 540 Q 400 552 428 540" stroke="#8B5A3C" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- soft top vignette -->
  <rect width="800" height="240" fill="url(#bg)" opacity="0.35"/>
</svg>
